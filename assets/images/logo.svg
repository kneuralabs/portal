<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="c"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <g clip-path="url(#c)">
    <!-- Left half - muted steel blue -->
    <rect x="0" y="0" width="100" height="200" fill="#4A8FA8"/>
    <!-- Left half diagonal depth shadow -->
    <polygon points="0,200 100,0 100,200" fill="rgba(0,0,0,0.07)"/>
    <!-- Top right quadrant - red base -->
    <rect x="100" y="0" width="100" height="100" fill="#E5222A"/>
    <!-- Top right darker red triangle -->
    <polygon points="100,100 200,0 200,100" fill="#C01820"/>
    <!-- Bottom right quadrant - cyan base -->
    <rect x="100" y="100" width="100" height="100" fill="#00AEEF"/>
    <!-- Bottom right darker cyan triangle -->
    <polygon points="100,100 100,200 200,200" fill="#009AD8"/>
  </g>
</svg>
