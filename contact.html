<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="index, follow" />
  <meta name="description" content="Get in touch with Kneuralabs to start your AI governance assessment or learn more about our services." />
  <title>Contact | Kneuralabs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/sections.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header></header>

  <main id="main-content">

    <!-- ── Contact ── -->
    <section class="contact section-lg" style="padding-top: calc(64px + clamp(64px,10vw,120px));">
      <div class="container">
        <div class="contact-grid">
          <div class="contact-info sr sr-left">
            <span class="section-tag">Contact</span>
            <h1 style="font-size:clamp(1.7rem,3.5vw,2.6rem);line-height:1.15;letter-spacing:-0.02em;margin-bottom:16px;">Start the conversation</h1>
            <p>Tell us about your AI landscape. We'll review your inquiry and respond within one business day.</p>

            <div class="contact-details">
              <div class="contact-detail">
                <div class="detail-icon">✉</div>
                <div>
                  <div class="detail-label">Email</div>
                  <div class="detail-value"><a href="mailto:hello@kneuralabs.com">hello@kneuralabs.com</a></div>
                </div>
              </div>
              <div class="contact-detail">
                <div class="detail-icon">📍</div>
                <div>
                  <div class="detail-label">Location</div>
                  <div class="detail-value">Manchester, CT 06042, USA</div>
                </div>
              </div>
              <div class="contact-detail">
                <div class="detail-icon">🕐</div>
                <div>
                  <div class="detail-label">Hours</div>
                  <div class="detail-value">Monday–Friday, 9 AM–5 PM EST<br />Appointments available by request.</div>
                </div>
              </div>
            </div>
          </div>

          <div class="contact-form sr sr-right">
            <form id="contactForm" novalidate>
              <div class="form-body">
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label" for="companyName">Company Name</label>
                    <input class="form-input" type="text" id="companyName" name="companyName" required placeholder="Acme Inc." />
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="yourName">Your Name</label>
                    <input class="form-input" type="text" id="yourName" name="yourName" required placeholder="Jane Smith" />
                  </div>
                </div>

                <div class="form-group">
                  <label class="form-label" for="email">Email</label>
                  <input class="form-input" type="email" id="email" name="email" required placeholder="jane@acme.com" />
                </div>

                <div class="form-group">
                  <label class="form-label" for="role">Role <span>(optional)</span></label>
                  <input class="form-input" type="text" id="role" name="role" placeholder="e.g., Chief Risk Officer, VP Engineering" />
                </div>

                <div class="form-group">
                  <label class="form-label" for="interest">Primary Interest</label>
                  <select class="form-input" id="interest" name="interest">
                    <option value="">Select a service…</option>
                    <option value="assessment">AI Risk Assessment</option>
                    <option value="framework">Governance Framework</option>
                    <option value="standards">Standards Readiness</option>
                    <option value="other">Other</option>
                  </select>
                </div>

                <div class="form-group">
                  <label class="form-label" for="message">Message <span>(optional)</span></label>
                  <textarea class="form-input" id="message" name="message" placeholder="Tell us about your AI governance needs…"></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-lg form-submit" style="width:100%;justify-content:center;">
                  Send Inquiry
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer></footer>

  <script src="js/components.js"></script>
  <script src="js/scroll.js" defer></script>
  <script src="js/form.js" defer></script>
</body>
</html>
